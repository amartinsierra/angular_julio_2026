<div id="favoritos" class="page">
        <h2>Favoritos</h2>
        <table  mat-table [dataSource]="dataSource" matSort matSortActive matSortDirection="asc" class="mat-elevation-z8">
                <ng-container matColumnDef="Email">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
                  <td mat-cell *matCellDef="let m">{{m.email}}</td>
                </ng-container>
                <ng-container matColumnDef="Nombre">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
                  <td mat-cell *matCellDef="let m">{{ m.nombre }}</td>
                </ng-container>
                <ng-container matColumnDef="Nota">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Nota</th>
                  <td mat-cell *matCellDef="let m">{{ m.nota }}</td>
                </ng-container>
                <ng-container matColumnDef="Curso">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Curso</th>
                  <td mat-cell *matCellDef="let m">{{ m.curso }}</td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
          <mat-paginator [pageSize]="2" [pageSizeOptions]="[2, 5, 10]" showFirstLastButtons></mat-paginator>

</div>
